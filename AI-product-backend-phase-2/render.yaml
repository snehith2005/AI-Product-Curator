# Render Blueprint for AI Product Curator Backend
# https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: curatly-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon  # or singapore for Asia
    plan: free  # or starter for better performance
    healthCheckPath: /health
    envVars:
      # Database (use Render PostgreSQL or external)
      - key: DATABASE_URL
        fromDatabase:
          name: curatly-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: curatly-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: curatly-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: curatly-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: curatly-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: curatly-db
          property: password
      # LLM API Keys (set manually in Render dashboard)
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      # JWT Secret (generate a secure random string)
      - key: JWT_SECRET_KEY
        generateValue: true
      # Environment
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"

databases:
  # PostgreSQL Database
  - name: curatly-db
    databaseName: ecommerce_ai
    user: curatly
    region: oregon  # Match your service region
    plan: free  # or starter for persistent storage
    ipAllowList: []  # Allow all IPs (Render internal)
